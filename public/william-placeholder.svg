<svg width="400" height="500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <!-- Gradient Background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9f7f4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0e8e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGradient)"/>

  <!-- Placeholder Avatar Circle -->
  <circle cx="200" cy="200" r="140" fill="white" filter="url(#shadow)"/>

  <!-- Icon (Person) -->
  <circle cx="200" cy="150" r="35" fill="#FFD200"/>
  <ellipse cx="200" cy="230" rx="55" ry="65" fill="#FFD200"/>

  <!-- Decorative Elements -->
  <rect x="20" y="20" width="60" height="4" fill="#FFD200" rx="2" opacity="0.6"/>
  <circle cx="380" cy="480" r="8" fill="#FFD200" opacity="0.4"/>
  <rect x="30" y="450" width="40" height="4" fill="#FFD200" rx="2" opacity="0.3"/>

  <!-- Text Placeholder -->
  <text x="200" y="380" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1C1C2E" text-anchor="middle" opacity="0.5">
    Photo William Martin
  </text>
  <text x="200" y="405" font-family="Arial, sans-serif" font-size="12" fill="#999" text-anchor="middle" opacity="0.4">
    Mis à jour prochainement
  </text>
</svg>
